<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DungeonForge - Menu</title>
    <link rel="stylesheet" href="./Css/headerFooter.css">
    <link rel="stylesheet" href="./Css/index.css">
    <link rel="icon" href="./Images/Icone/icone.png">
</head>

<body class="menu-body">

    <audio id="menu-music" src="./Audio/Evoland 2 OST - Track 01 (Title Screen).mp3" loop></audio>

    <main>

        <!-- Paramètres -->

        <span id="settings">
            <div class="settings-card">
                <div class="settings-close"><button id="closeSettingsBtn"><img src="./Images/MainMenu/crux.png"
                            alt="Fermer"></button></div>
                <div class="settings-header">Paramètres</div>
                <div class="settings-body">
                    <div class="settings-row">
                        <div class="settings-label">Volume de la musique</div>
                        <div class="settings-control">
                            <input type="range" id="settings-volume" min="0" max="100" value="50">
                        </div>
                    </div>
                    <div class="settings-row">
                        <div class="settings-label">Muet</div>
                        <div class="settings-control">
                            <input type="checkbox" id="settings-mute">
                        </div>
                    </div>
                </div>
                <div class="settings-footer">DungeonForge</div>
            </div>
        </span>

        <div class="menu-container">
            <section id="main-menu">
                <div class="logo-wrapper">
                    <img src="./Images/MainMenu/logo.svg" id="game-logo" alt="DOMgeonForge Logo">
                </div>

                <nav id="menu-buttons" >
                    <button class="menu-btn" id="new-game-btn">
                        <img src="./Images/MainMenu/btn_nouvelle_aventure.svg" alt="Nouvelle Aventure" class="menu-btn">
                    </button>
                    <button class="menu-btn" id="resume-btn">
                        <img src="./Images/MainMenu/btn_reprendre.svg" alt="Reprendre" class="menu-btn">
                    </button>
                    <button class="menu-btn" id="settings-btn">
                        <img src="./Images/MainMenu/btn_configurer.svg" alt="Configurer" class="menu-btn">
                    </button>
                    <button class="menu-btn" id="quit-btn">
                        <img src="./Images/MainMenu/btn_quitter.svg" alt="Quitter" class="menu-btn">
                    </button>
                </nav>
            </section>
        </div>
    </main>

    <footer>
        <p><strong>DungeonForge</strong></p>
        <p>Projet Ynov Bachelor Informatique 1</p>
    </footer>

    <script src="./JavaScript/mainMenu.js" defer></script>
    <script src="./JavaScript/Common/audio.js" defer></script>
    <script src="./JavaScript/Common/settings.js" defer></script>
    <script src="./JavaScript/Scripts/Ui/saveMenu.js" defer></script>

</body>

</html>
