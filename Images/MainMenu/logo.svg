<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe080"/>
      <stop offset="30%" stop-color="#c8902a"/>
      <stop offset="60%" stop-color="#e0a030"/>
      <stop offset="100%" stop-color="#7a4a08"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0f0"/>
      <stop offset="50%" stop-color="#9090a8"/>
      <stop offset="100%" stop-color="#404050"/>
    </linearGradient>
  </defs>

  <!-- Bandeau supérieur "A PIXEL ODYSSEY" style -->
  <rect x="250" y="8" width="300" height="28" fill="#2a1808" rx="3"/>
  <rect x="252" y="10" width="296" height="24" fill="#3a2210" rx="2"/>
  <line x1="252" y1="22" x2="548" y2="22" stroke="#c8902a" stroke-width="0.5" opacity="0.5"/>
  <text x="400" y="27" font-family="Georgia, serif" font-size="11" fill="#c8a050" text-anchor="middle" letter-spacing="4" font-style="italic">A PIXEL ODYSSEY</text>
  <!-- Décorations bandeau -->
  <polygon points="240,22 252,16 252,28" fill="#c8902a"/>
  <polygon points="560,22 548,16 548,28" fill="#c8902a"/>
  <rect x="230" y="20" width="12" height="4" fill="#8a6010"/>
  <rect x="558" y="20" width="12" height="4" fill="#8a6010"/>

  <!-- Bordure extérieure du logo -->
  <rect x="20" y="42" width="760" height="130" fill="#1a0e06" rx="6" filter="url(#shadow)"/>
  <rect x="22" y="44" width="756" height="126" fill="#0e0806" rx="5"/>
  
  <!-- Cadre décoratif -->
  <rect x="25" y="47" width="750" height="120" fill="none" stroke="#5c4a1e" stroke-width="2" rx="4"/>
  <rect x="28" y="50" width="744" height="114" fill="none" stroke="#3a2a0e" stroke-width="1" rx="3"/>

  <!-- Coins décoratifs -->
  <rect x="20" y="42" width="24" height="24" fill="#c8902a" rx="2"/>
  <rect x="756" y="42" width="24" height="24" fill="#c8902a" rx="2"/>
  <rect x="20" y="148" width="24" height="24" fill="#c8902a" rx="2"/>
  <rect x="756" y="148" width="24" height="24" fill="#c8902a" rx="2"/>
  <rect x="24" y="46" width="16" height="16" fill="#8a6010" rx="1"/>
  <rect x="760" y="46" width="16" height="16" fill="#8a6010" rx="1"/>
  <rect x="24" y="152" width="16" height="16" fill="#8a6010" rx="1"/>
  <rect x="760" y="152" width="16" height="16" fill="#8a6010" rx="1"/>

  <!-- Gemme centrale dans le O de DOM -->
  <!-- Texte principal - ombre portée -->
  <text x="403" y="141" font-family="Georgia, 'Times New Roman', serif" font-size="90" fill="#2a1000" text-anchor="middle" font-weight="bold" letter-spacing="-2" filter="url(#shadow)">DOMgeonForge</text>
  
  <!-- Texte principal - contour argent -->
  <text x="400" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="90" fill="url(#silverGrad)" text-anchor="middle" font-weight="bold" letter-spacing="-2" stroke="#404050" stroke-width="4">DOMgeonForge</text>
  
  <!-- Texte principal - remplissage or -->
  <text x="400" y="138" font-family="Georgia, 'Times New Roman', serif" font-size="90" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold" letter-spacing="-2">DOMgeonForge</text>

  <!-- Gemme rouge dans le premier O (position approximative) -->
  <ellipse cx="207" cy="108" rx="14" ry="16" fill="#cc2020" filter="url(#glow)"/>
  <ellipse cx="207" cy="108" rx="11" ry="13" fill="#ee3030"/>
  <ellipse cx="203" cy="103" rx="4" ry="5" fill="#ff6060" opacity="0.7"/>
  <ellipse cx="207" cy="108" rx="14" ry="16" fill="none" stroke="#880000" stroke-width="2"/>

  <!-- Lignes décoratives flanc gauche -->
  <line x1="35" y1="107" x2="90" y2="107" stroke="#c8902a" stroke-width="1.5"/>
  <line x1="35" y1="103" x2="80" y2="103" stroke="#8a6010" stroke-width="0.8"/>
  <line x1="35" y1="111" x2="80" y2="111" stroke="#8a6010" stroke-width="0.8"/>
  <polygon points="35,107 48,101 48,113" fill="#c8902a"/>
  
  <!-- Lignes décoratives flanc droit -->
  <line x1="1885" y1="107" x2="710" y2="107" stroke="#c8902a" stroke-width="1.5"/>
  <line x1="720" y1="103" x2="765" y2="103" stroke="#8a6010" stroke-width="0.8"/>
  <line x1="720" y1="111" x2="765" y2="111" stroke="#8a6010" stroke-width="0.8"/>
  <polygon points="765,107 752,101 752,113" fill="#c8902a"/>
</svg>
