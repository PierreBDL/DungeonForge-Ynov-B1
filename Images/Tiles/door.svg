<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50" width="50" height="50">
  <!-- Cadre en pierre -->
  <rect x="4" y="2" width="42" height="48" rx="2" fill="#4a4040"/>
  <!-- Intérieur cadre -->
  <rect x="8" y="4" width="34" height="44" rx="1" fill="#2a1a08"/>
  <!-- Porte en bois -->
  <rect x="10" y="5" width="30" height="43" rx="1" fill="#6b4010"/>
  <!-- Planches horizontales -->
  <line x1="10" y1="19" x2="40" y2="19" stroke="#5a3008" stroke-width="1.5"/>
  <line x1="10" y1="33" x2="40" y2="33" stroke="#5a3008" stroke-width="1.5"/>
  <!-- Planches verticales -->
  <line x1="25" y1="5" x2="25" y2="48" stroke="#5a3008" stroke-width="1"/>
  <!-- Renforts diagonaux haut -->
  <line x1="10" y1="5" x2="25" y2="19" stroke="#5a3008" stroke-width="1"/>
  <line x1="40" y1="5" x2="25" y2="19" stroke="#5a3008" stroke-width="1"/>
  <!-- Renforts diagonaux milieu -->
  <line x1="10" y1="19" x2="25" y2="33" stroke="#5a3008" stroke-width="1"/>
  <line x1="40" y1="19" x2="25" y2="33" stroke="#5a3008" stroke-width="1"/>
  <!-- Poignée -->
  <circle cx="35" cy="27" r="2.5" fill="#c8902a" stroke="#8b6010" stroke-width="0.8"/>
  <circle cx="35" cy="27" r="1" fill="#8b6010"/>
  <!-- Ferrures cadre -->
  <rect x="4" y="2" width="6" height="6" rx="1" fill="#666"/>
  <rect x="40" y="2" width="6" height="6" rx="1" fill="#666"/>
  <rect x="4" y="42" width="6" height="8" rx="1" fill="#666"/>
  <rect x="40" y="42" width="6" height="8" rx="1" fill="#666"/>
  <!-- Rivets ferrures -->
  <circle cx="7" cy="5" r="1" fill="#888"/>
  <circle cx="43" cy="5" r="1" fill="#888"/>
  <circle cx="7" cy="46" r="1" fill="#888"/>
  <circle cx="43" cy="46" r="1" fill="#888"/>
</svg>
